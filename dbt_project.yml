name: 'ecommerce_analytics'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_analytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_analytics:
    +database: ECOMMERCE
    staging:
      +materialized: view
      +schema: STG
    intermediate:
      +materialized: table
      +schema: INT
    dimensions:
      +materialized: table
      +schema: DIMS
    facts:
      +materialized: table
      +schema: FACTS
    marts:
      +materialized: table
      +schema: MARTS
