version: 2

models:
  - name: dim_customers
    description: "Customer dimension with region mapping"
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_region
        tests:
          - not_null

  - name: dim_products
    description: "Product dimension with English categories"
    columns:
      - name: product_key
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_sellers
    description: "Seller dimension with region mapping"
    columns:
      - name: seller_key
        tests:
          - unique
          - not_null
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Date dimension covering 2016-2019"
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null