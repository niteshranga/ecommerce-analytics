version: 2

models:
  - name: fct_orders
    description: "One row per order with payment and review metrics"
    columns:
      - name: order_key
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

  - name: fct_order_items
    description: "One row per order line item"
    columns:
      - name: order_item_key
        tests:
          - unique
          - not_null
      - name: order_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_key
      - name: seller_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_key