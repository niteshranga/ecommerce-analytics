version: 2

models:
  - name: stg_orders
    description: "Cleaned and typed orders from RAW layer"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable',
                         'invoiced', 'processing', 'approved', 'created']
      - name: order_purchase_timestamp
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer data with region mapping"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null
      - name: customer_state
        tests:
          - not_null
      - name: customer_region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Southeast', 'South', 'Northeast', 'North', 'Other']

  - name: stg_order_items
    description: "Cleaned order line items with derived total value"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: total_item_value
        tests:
          - not_null

  - name: stg_products
    description: "Products with English category translation"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_category_name
        tests:
          - not_null

  - name: stg_sellers
    description: "Cleaned seller data with region mapping"
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
      - name: seller_state
        tests:
          - not_null

  - name: stg_order_payments
    description: "Cleaned payments with type grouping"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null
      - name: payment_type
        description: "Payment method used. Records with payment_type = 'not_defined' are excluded in staging as they hold no analytical value."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_card', 'debit_card', 'boleto', 'voucher','not_defined']

  - name: stg_order_reviews
    description: "Cleaned reviews with sentiment labels"
    columns:
      - name: review_id
        description: "Unique review identifier. Source data contains duplicates deduplication handled in int_order_reviews"
        tests:
          # unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null
      - name: review_sentiment
        tests:
          - accepted_values:
              arguments:
                values: ['Positive', 'Neutral', 'Negative', 'Unknown']